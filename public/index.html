<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamLine | Premium YouTube Downloader</title>
    <meta name="description" content="Download YouTube videos locally with a sleek, premium interface.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <header>
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21.4086 9.35258C23.5305 10.5065 23.5305 13.4935 21.4086 14.6474L8.59662 21.6145C6.53435 22.736 4 21.2763 4 18.9671L4 5.0329C4 2.72368 6.53435 1.26402 8.59661 2.38548L21.4086 9.35258Z" fill="var(--accent-color)"/>
                    </svg>
                    <h1>StreamLine</h1>
                </div>
                <p>Seamlessly download your favorite YouTube videos in incredible quality.</p>
            </header>

            <form id="download-form" class="download-form">
                <div class="input-group">
                    <input type="url" id="video-url" placeholder="Paste YouTube link here..." required autocomplete="off">
                    <div class="input-glow"></div>
                </div>
                
                <button type="submit" id="download-btn" class="btn-primary">
                    <span class="btn-text">Download Video</span>
                    <span class="btn-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </span>
                    <div class="loader hidden" id="btn-loader"></div>
                </button>
            </form>

            <div id="status-message" class="status-message hidden"></div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 StreamLine. Built with <span class="heart">♥</span> for a seamless experience.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
