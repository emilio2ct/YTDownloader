<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamLine | Premium YouTube Downloader</title>
    <!-- Outfit Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.3">
</head>

<body>
    <div class="glass-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="wrapper">
        <header>
            <div class="logo">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M21.4086 9.35258C23.5305 10.5065 23.5305 13.4935 21.4086 14.6474L8.59662 21.6145C6.53435 22.736 4 21.2763 4 18.9671L4 5.0329C4 2.72368 6.53435 1.26402 8.59661 2.38548L21.4086 9.35258Z"
                        fill="#ca8a04" />
                </svg>
            </div>
            <h1>YTDownloader <span class="accent">PRO</span></h1>
            <p class="subtitle">Experience media extraction at its finest.</p>
        </header>

        <main class="glass-card">
            <div class="input-section">
                <input type="text" id="videoUrl" placeholder="Paste YouTube link here..." aria-label="YouTube URL"
                    autocomplete="off">
                <div class="input-glow"></div>
            </div>

            <div class="config-grid">
                <div class="config-group">
                    <label>Format</label>
                    <div class="toggle-group" id="formatToggle">
                        <button class="toggle-btn active" data-value="mp4">MP4</button>
                        <button class="toggle-btn" data-value="mp3">MP3</button>
                    </div>
                </div>

                <div class="config-group">
                    <label id="qualityLabel">Resolution</label>
                    <div class="chips-container" id="qualityChips">
                        <!-- Chips will be injected by script.js -->
                    </div>
                </div>
            </div>

            <button id="downloadBtn" class="download-btn">
                <span id="btnText">Download Now</span>
                <div class="spinner hidden" id="spinner"></div>
            </button>

            <div id="status" class="status-msg"></div>
        </main>

        <footer>
            <p>&copy; 2026 StreamLine • Local & Secure</p>
        </footer>
    </div>
    <script src="script.js?v=1.3"></script>
</body>

</html>
